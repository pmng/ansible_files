---
- name: Setup raw disk and mount
  hosts: redhat5
  become: true
  vars:
    disk: "{{ my_disk | default('sdb') }}"
    part: "{{ my_part | default('1') }}"
    vgname: rawvg
    lvname: rawlv
  roles:
  tasks:
    - name: Check if disk exist
      ansible.builtin.assert:
        that:
          - disk is in ansible_facts['devices']
        fail_msg: "disk not exist"

    - name: Disk partition block
      block:
        - name: fail if partition not exist
          when: (disk~part) is not in ansible_facts['devices'][disk]['partitions']
          fail: 
            msg: "part not exist, create one"
      rescue: 
        - name: Create part
          ansible.builtin.shell:
            "parted -s /dev/{{ disk }} mklabel gpt mkpart primary 0% 1GB"

    - name: pv block
      block:
        - name: failed if pv exist
          ansible.builtin.fail:
            msg: pv not exist, create it
          when: ('/dev/'~disk~part) is not in ansible_facts['lvm']['pvs']
      rescue:
        - name: Create pv
          ansible.builtin.shell:
            "pvcreate /dev/{{ disk }}{{ part }}"
          changed_when: true
    
    - name: vg block
      block:
        - name: fail if vg not exist
          when: vgname is not in ansible_facts['lvm']['vgs']
          ansible.builtin.fail:
            msg: vg not exist, create one
      rescue:
        - name: Create vg
          ansible.builtin.shell:
            "vgcreate {{ vgname }} /dev/{{ disk }}{{ part }}"
          changed_when: true

    - name: lv block
      block:
        - name: failed if lv not exist
          when: lvname is not in ansible_facts['lvm']['lvs'] 
          ansible.builtin.fail:
            msg: lv not exist, create one
      rescue:
        - name: Create lv
          ansible.builtin.shell:
            "lvcreate -L 500m -n {{ lvname }} {{ vgname }}"
          changed_when: true

    - name: fs block
      block:
        - name: Get type of fs
          shell:
            blkid | grep {{ lvname }} | awk '{ print $2 }' 
          register: exist_fstype
          changed_when: false
          ignore_errors: true

        - name: Fail if fs not exist
          when: exist_fstype.stdout == ''
          ansible.builtin.fail:
            msg: "FS not exist"
      rescue:
        - name: Create fs
          ansible.builtin.shell:
            "mkfs -t ext4 /dev/mapper/{{ vgname}}-{{ lvname }}"
          changed_when: true

    - name: Gather facts
      ansible.builtin.gather_facts:
    
    - name: Get uuid
      ansible.builtin.shell:
        "blkid | grep {{ lvname }} | awk '{print $2}'"
      changed_when: true
      register: uuid

    - name: Mount using uuid
      when: uuid.stdout != ''
      ansible.posix.mount:
        src: "{{ uuid.stdout }}"
        path: /mnt/lvmmount
        state: mounted
        fstype: ext4
  handlers:
...
